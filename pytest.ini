[pytest]
# pytest configuration for ROBO Chat

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage options
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=html
    --cov-report=term-missing

# Test paths
testpaths = tests

# Markers for organizing tests
markers =
    unit: Unit tests
    integration: Integration tests
    api: API-related tests
    ui: UI-related tests
    edge_case: Edge case tests
    slow: Slow running tests

# Ignore patterns
norecursedirs = .git .venv venv __pycache__ .streamlit

# Logging
log_cli = false
log_cli_level = INFO
